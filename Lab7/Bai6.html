<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 20px auto;
            text-align: center;
        }

        h1 {
            color: #006633;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-box {
            margin-bottom: 30px;
        }

        button {
            background-color: #006633;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background-color: #004d26;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #006633;
            color: white;
            border: 1px solid #ccc;
            padding: 15px;
            font-size: 16px;
        }

        td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
            font-size: 15px;
            color: #333;
        }

        .con-hang {
            color: #008000;
            font-weight: bold;
        }

        .het-hang {
            color: #ff0000;
            font-weight: bold;
        }

        tr:hover td {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Danh sách sản phẩm</h1>

        <div class="btn-box">
            <button onclick="loadProducts()">Load sản phẩm</button>
        </div>

        <div id="productTable"></div>
    </div>

    <script>
        function Product(id, name, quantity, price, status){
            this.id = id;
            this.name = name;
            this.quantity = quantity;
            this.price = price;
            this.status = status;
        }

        const productList = [
            new Product(1, "Laptop Dell", 10, 15000000, "Còn hàng"),
            new Product(2, "Chuột Logitech", 25, 350000, "Còn hàng"),
            new Product(3, "Bàn phím DareU", 15, 500000, "Còn hàng"),
            new Product(4, "Màn hình LG", 8, 3200000, "Còn hàng"),
            new Product(5, "USB Kingston", 0, 200000, "Hết hàng"),
        ];

        function loadProducts(){
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên sản phẩm</th>
                            <th>Số lượng</th>
                            <th>Đơn giá</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for(let i = 0; i < productList.length; i++){
                html += `
                    <tr>
                        <td>${productList[i].id}</td>
                        <td>${productList[i].name}</td>
                        <td>${productList[i].quantity}</td>
                        <td>${productList[i].price.toLocaleString('vi-VN')} đ</td>
                        <td class="${productList[i].status === 'Còn hàng' ? 'con-hang' : 'het-hang'}">
                            ${productList[i].status}
                        </td>
                    </tr>
                `;
            }

            html += `
                    </tbody>
                </table>
            `;

            document.getElementById("productTable").innerHTML = html;
        }
    </script>

</body>
</html>
